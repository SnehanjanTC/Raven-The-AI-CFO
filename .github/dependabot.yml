version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: chore
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps require manual review — they often have breaking changes.
      # Remove an entry here to opt that package back into automatic major PRs.
      - dependency-name: express
        update-types: [version-update:semver-major]
      - dependency-name: "@vitejs/plugin-react"
        update-types: [version-update:semver-major]
      - dependency-name: lucide-react
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: react-router-dom
        update-types: [version-update:semver-major]
      - dependency-name: vite
        update-types: [version-update:semver-major]
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github_actions
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"
